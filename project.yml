name: WaterReminder
options:
  minimumXcodeGenVersion: 2.38.0

settings:
  base:
    SWIFT_VERSION: 5.0

targets:
  WaterReminder:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - README.md
          - project.yml
          - codemagic.yaml
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: WaterReminder
        CFBundleShortVersionString: 1.0
        CFBundleVersion: 1
        UILaunchScreen: {}
        NSUserNotificationsUsageDescription: Приложение отправляет напоминания пить воду
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hitmm44.waterreminder
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets: []
